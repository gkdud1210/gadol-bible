<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#1a2456"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d080"/>
      <stop offset="100%" style="stop-color:#c8960a"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- 십자가 심볼 -->
  <rect x="236" y="80" width="40" height="200" rx="8" fill="url(#gold)" opacity="0.85"/>
  <rect x="156" y="140" width="200" height="40" rx="8" fill="url(#gold)" opacity="0.85"/>
  <!-- 텍스트 -->
  <text x="256" y="360" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="52" font-weight="700" fill="url(#gold)" text-anchor="middle" letter-spacing="-1">가돌헤세드</text>
  <text x="256" y="430" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="38" font-weight="500" fill="#a0b4e0" text-anchor="middle">바이블</text>
</svg>
